name: Render Contribution Bomber

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the video back to the repo
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Render Video
        # Passes your username as a prop. Outputting an uncompromised full-size GIF (1200x600) at 30fps.
        run: npx remotion render MyComp out.gif --props='{"username": "dhruv-mavani"}'

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add out.gif
          git commit -m "chore: auto-update contribution bomber video [skip ci]" || echo "No changes to commit"
          git push
