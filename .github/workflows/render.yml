name: Render Contribution Bomber

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the video back to the repo
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npx pnpm install --no-frozen-lockfile
          npx pnpm add @tailwindcss/oxide-linux-x64-gnu

      - name: Render Video
        # Automatically passes the repository owner's username as a prop so anyone can fork this!
        run: |
          npx remotion render MyComp out.gif --props='{"username": "${{ github.repository_owner }}"}'

      - name: Generate Personalized Embed Code
        run: |
          echo "# 🎉 Your Bomber is Ready!" > USAGE.md
          echo "" >> USAGE.md
          echo "Copy and paste this exact code anywhere in your Profile README (\`${{ github.repository_owner }}/${{ github.repository_owner }}\`):" >> USAGE.md
          echo "" >> USAGE.md
          echo "\`\`\`html" >> USAGE.md
          echo "<img src=\"https://github.com/${{ github.repository_owner }}/github-contribution-bomber/blob/main/out.gif?raw=true\" width=\"100%\" />" >> USAGE.md
          echo "\`\`\`" >> USAGE.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add out.gif USAGE.md
          git commit -m "chore: auto-update contribution bomber video [skip ci]" || echo "No changes to commit"
          git push
